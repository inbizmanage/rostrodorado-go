                    </div>
                  </div>
                  <div class="text-center">
                    <p class="text-white/30 text-xs mb-2">o pega una URL directa</p>
                    <input type="url" x-model="seleccionado['Imagen Principal']" placeholder="https://..." class="w-full bg-black/20 border border-white/10 p-2 rounded-lg text-white text-sm focus:border-gold outline-none">
                  </div>
                </div>
              </div>

              <!-- Galería Adicional -->
              <div class="space-y-4 pt-4 border-t border-white/10">
                <div class="flex justify-between items-center">
                  <label class="text-xs uppercase tracking-widest text-gold font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-image"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path></svg> 
                    Galería Adicional
                  </label>
                  <label class="text-[10px] bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg transition-colors cursor-pointer inline-flex items-center">
                    + Agregar Item
                    <input type="file" accept="image/*" multiple class="hidden" @change="subirGaleria($event)">
                  </label>
                </div>
                <div class="space-y-2">
                  <textarea x-model="seleccionado['Galeria (URLs)']" rows="2" placeholder="URLs separadas por comas (se auto-rellena al subir)" class="w-full bg-black/20 border border-white/10 p-3 rounded-lg text-white text-xs focus:border-gold outline-none"></textarea>
                </div>
              </div>

              <!-- Textos Extras -->
              <div class="space-y-2">
                <label class="text-xs uppercase tracking-widest text-white/50">Descripción Corta *</label>
                <textarea required rows="2" x-model="seleccionado['Descripcion Corta']" class="w-full bg-black/20 border border-white/10 p-3 rounded-lg text-white focus:border-gold outline-none" placeholder="Descripción breve que aparece en las tarjetas de producto"></textarea>
              </div>
              <div class="space-y-2">
                <label class="text-xs uppercase tracking-widest text-white/50">Descripción Larga</label>
                <textarea rows="3" x-model="seleccionado['Descripcion Larga']" class="w-full bg-black/20 border border-white/10 p-3 rounded-lg text-white focus:border-gold outline-none" placeholder="Descripción detallada del producto"></textarea>
              </div>
              <div class="space-y-2">
                <label class="text-xs uppercase tracking-widest text-white/50">Ingredientes</label>
                <input x-model="seleccionado['Ingredientes']" class="w-full bg-black/20 border border-white/10 p-3 rounded-lg text-white focus:border-gold outline-none" placeholder="Separados por comas: Ácido Hialurónico, Aloe Vera, Vitamina E">
              </div>
              <div class="space-y-2">
                <label class="text-xs uppercase tracking-widest text-white/50">Modo de Uso</label>
                <textarea rows="2" x-model="seleccionado['Modo Uso']" class="w-full bg-black/20 border border-white/10 p-3 rounded-lg text-white focus:border-gold outline-none" placeholder="Instrucciones de uso del producto"></textarea>
              </div>
              <div class="space-y-2">
                <label class="text-xs uppercase tracking-widest text-white/50">Beneficios</label>
                <input x-model="seleccionado['Beneficios']" class="w-full bg-black/20 border border-white/10 p-3 rounded-lg text-white focus:border-gold outline-none" placeholder="Separados por comas: Hidratación intensa, Efecto relleno, Mejora textura">
              </div>

              <!-- Botones Finales -->
              <div class="flex flex-col-reverse md:flex-row gap-3 pt-4 border-t border-white/10">
                <button type="button" @click="seleccionado = null" class="w-full md:w-auto px-8 py-3 bg-white/5 text-white rounded-xl hover:bg-white/10 transition-colors text-center">Cancelar</button>
                <button type="button" @click="eliminar()" x-show="seleccionado.ID" class="w-full md:w-auto px-4 py-3 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500/20 transition-colors flex justify-center items-center" title="Borrar Producto">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash2"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>
                </button>
                <button type="submit" class="w-full md:flex-1 font-bold uppercase tracking-widest px-8 py-3 rounded-xl transition-colors bg-gold text-black hover:bg-white" x-text="seleccionado.ID ? 'Guardar Cambios' : 'Crear Producto'"></button>
              </div>
            </div>
          </form>

        </div>
      </template>
    </main>

    <!-- Notificaciones Toast -->
    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-2">
      <template x-for="toast in toasts" :key="toast.id">
        <div x-transition.duration.300ms
             :class="toast.type === 'success' ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-red-500/10 border-red-500/30 text-red-400'"
             class="border rounded-xl px-4 py-3 shadow-lg flex items-center gap-3 min-w-[250px] backdrop-blur-md bg-dark-card/90">
          <i :class="toast.type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'" class="ph text-xl"></i>
          <span class="text-sm font-medium" x-text="toast.message"></span>
        </div>
      </template>
    </div>

    <!-- DRAWER: Chat con Alex -->
    <div x-show="isChatOpen" style="display: none;" class="fixed inset-0 z-[100] flex justify-end">
      <!-- Overlay oscuro -->
      <div x-show="isChatOpen" x-transition.opacity class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="isChatOpen = false"></div>
      
      <!-- Panel lateral -->
      <div x-show="isChatOpen" 
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="translate-x-full"
           x-transition:enter-end="translate-x-0"
           x-transition:leave="transition ease-in duration-300"
           x-transition:leave-start="translate-x-0"
           x-transition:leave-end="translate-x-full"
           class="relative w-full md:w-[450px] bg-[#111] border-l border-white/10 h-full flex flex-col shadow-2xl">
        
        <!-- Cabecera -->
        <div class="p-4 border-b border-white/10 flex justify-between items-center bg-black/40">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gold/20 flex items-center justify-center text-gold border border-gold/30">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bot"><path d="M12 8V4H8"></path><rect width="16" height="12" x="4" y="8" rx="2"></rect><path d="M2 14h2"></path><path d="M20 14h2"></path><path d="M15 13v2"></path><path d="M9 13v2"></path></svg>
            </div>
            <div>
              <h3 class="text-white font-bold text-sm">Asistente Alex</h3>
              <p class="text-[10px] text-white/50" x-text="'Editando: ' + (seleccionado?.['PRODUCTO'] || 'Nuevo Producto')"></p>
            </div>
          </div>
          <button @click="isChatOpen = false" class="text-white/50 hover:text-white p-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
          </button>
        </div>

        <!-- Historial de Chat -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-container">
          <template x-for="(msg, index) in chatMessages" :key="index">
            <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
              <div :class="msg.role === 'user' ? 'bg-white/10 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-gold/10 border border-gold/20 text-gold rounded-r-2xl rounded-tl-2xl'" class="max-w-[85%] p-3 text-sm">
                
                <!-- Contenido del mensaje. Renderizamos JSON si lo detecta, o texto plano -->
                <template x-if="msg.role === 'assistant' && msg.hasJson">
                  <div class="space-y-3">
                    <p class="whitespace-pre-wrap text-[13px]" x-text="msg.textPart"></p>
                    <div class="bg-black/50 border border-white/5 rounded-lg p-3 text-[10px] font-mono text-white/70 overflow-x-auto">
                      <pre x-text="JSON.stringify(msg.jsonData, null, 2)"></pre>
                    </div>
                    <button @click="aplicarDatosJson(msg.jsonData)" class="w-full py-2 bg-gold text-black font-bold text-xs rounded hover:bg-white transition-colors">
                      Aplicar estos datos al formulario
                    </button>
                  </div>
                </template>

                <template x-if="!msg.hasJson">
                  <p class="whitespace-pre-wrap text-[13px]" x-text="msg.content"></p>
                </template>

              </div>
            </div>
          </template>

          <!-- Indicador de Escribiendo -->
          <div x-show="isAlexTyping" class="flex justify-start">
            <div class="bg-gold/5 border border-gold/10 text-gold rounded-r-2xl rounded-tl-2xl p-4 flex gap-1 items-center">
              <div class="w-1.5 h-1.5 bg-gold rounded-full animate-bounce"></div>
              <div class="w-1.5 h-1.5 bg-gold rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
              <div class="w-1.5 h-1.5 bg-gold rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            </div>
          </div>
        </div>

        <!-- Input de Mensaje -->
        <div class="p-4 border-t border-white/10 bg-black/40">
          <form @submit.prevent="enviarMensajeAlex()" class="relative flex items-center">
            <input x-model="chatInput" type="text" placeholder="Pídele a Alex que investigue..." :disabled="isAlexTyping" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-4 pr-12 text-white text-sm focus:border-gold outline-none disabled:opacity-50">
            <button type="submit" :disabled="!chatInput.trim() || isAlexTyping" class="absolute right-2 p-2 text-gold hover:bg-white/5 rounded-lg disabled:opacity-30 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>
            </button>
          </form>
          <p class="text-[9px] text-white/30 text-center mt-2">Alex usa Inteligencia Artificial y puede cometer errores.</p>
        </div>
        
      </div>
    </div>

  </div>

  <!-- Inyección de dependencias JS (Alpine) -->
  <?!= include('app'); ?>

</body>
</html>
